name: Demo pipeline

on:
    push:
        branches: [main, dev]

    pull_request:
        branches: [main]

jobs:
    setup_job:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
            - name: print hello world
              run: echo "Hello World"
            - name: display reamdme file
              run: cat README.md

    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "14"

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test

    deploy:
        runs-on: ubuntu-latest

        steps:
            - run: echo hello world
